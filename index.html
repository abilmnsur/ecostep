<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoStep — Начни менять мир</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .eco-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        [data-lang] { transition: opacity 0.2s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="fixed top-0 w-full z-50 glass border-b border-emerald-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fas fa-leaf text-emerald-500 text-2xl"></i>
                <span class="text-2xl font-extrabold tracking-tight text-emerald-600 italic">EcoStep</span>
            </div>
            
            <div class="hidden md:flex gap-8 font-semibold text-slate-600">
                <a href="#about" data-key="nav_about" class="hover:text-emerald-500 transition">О проекте</a>
                <a href="#map" data-key="nav_map" class="hover:text-emerald-500 transition">Эко-карта</a>
                <a href="#rewards" data-key="nav_rewards" class="hover:text-emerald-500 transition">Бонусы</a>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
                    <button onclick="setLanguage('ru')" id="btn-ru" class="px-3 py-1 rounded-lg text-xs font-bold transition-all bg-white shadow-sm">RU</button>
                    <button onclick="setLanguage('kz')" id="btn-kz" class="px-3 py-1 rounded-lg text-xs font-bold transition-all text-slate-400">KZ</button>
                </div>
                <button data-key="btn_join" class="eco-gradient text-white px-5 py-2 rounded-xl font-bold text-sm shadow-lg hover:scale-105 transition">Присоединиться</button>
            </div>
        </div>
    </nav>

    <header class="pt-44 pb-20 px-6">
        <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 items-center">
            <div class="space-y-8">
                <div class="inline-block bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest" data-key="badge">Startup Kazakhstan 2026</div>
                <h1 class="text-6xl md:text-7xl font-black leading-tight tracking-tighter" id="hero-title">
                    Твои отходы — <br><span class="text-emerald-500 uppercase">валюта.</span>
                </h1>
                <p class="text-xl text-slate-500 max-w-lg font-medium" data-key="hero_desc">
                    EcoStep — первая цифровая платформа, которая платит за ответственное отношение к природе.
                </p>
                <div class="flex items-center gap-6">
                    <button class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-3 hover:bg-emerald-600 transition shadow-2xl group">
                        <span data-key="btn_start">Начать менять мир</span>
                        <i class="fas fa-arrow-right group-hover:translate-x-2 transition"></i>
                    </button>
                </div>
            </div>

            <div class="relative">
                <div class="absolute -inset-10 bg-emerald-400/20 blur-[100px] rounded-full"></div>
                <div class="relative glass border-2 border-white p-8 rounded-[3rem] shadow-2xl">
                    <div class="flex justify-between items-center mb-10">
                        <div>
                            <p class="text-xs font-bold text-slate-400 uppercase" data-key="card_balance">Твой баланс</p>
                            <div class="text-4xl font-black text-slate-800">5,240 <span class="text-emerald-500 text-2xl">🌿</span></div>
                        </div>
                        <div class="w-14 h-14 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-xl shadow-lg shadow-emerald-200">
                            <i class="fas fa-qrcode"></i>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center"><i class="fas fa-check"></i></div>
                                <div>
                                    <p class="font-bold text-sm" data-key="act_1">Пластик сдан</p>
                                    <p class="text-xs text-slate-400">11.03.2026</p>
                                </div>
                            </div>
                            <span class="font-bold text-emerald-600">+120</span>
                        </div>
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center"><i class="fas fa-running"></i></div>
                                <div>
                                    <p class="font-bold text-sm" data-key="act_2">Эко-челлендж</p>
                                    <p class="text-xs text-slate-400" data-key="status">В процессе</p>
                                </div>
                            </div>
                            <span class="font-bold text-slate-300">+500</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <script>
        const translations = {
            ru: {
                nav_about: "О проекте",
                nav_map: "Эко-карта",
                nav_rewards: "Бонусы",
                btn_join: "Присоединиться",
                badge: "Startup Kazakhstan 2026",
                hero_title: 'Твои отходы — <br><span class="text-emerald-500 uppercase">валюта.</span>',
                hero_desc: "EcoStep — первая цифровая платформа, которая платит за ответственное отношение к природе. Сортируй мусор и получай бонусы.",
                btn_start: "Начать менять мир",
                card_balance: "Твой баланс",
                act_1: "Пластик сдан",
                act_2: "Эко-челлендж",
                status: "В процессе"
            },
            kz: {
                nav_about: "Жоба туралы",
                nav_map: "Эко-карта",
                nav_rewards: "Бонустар",
                btn_join: "Қосылу",
                badge: "Startup Kazakhstan 2026",
                hero_title: 'Сенің қалдықтарың — <br><span class="text-emerald-500 uppercase">валюта.</span>',
                hero_desc: "EcoStep — табиғатқа жауапкершілікпен қарағаны үшін төлейтін алғашқы цифрлық платформа. Қоқысты сұрыптап, бонустар ал.",
                btn_start: "Әлемді өзгертуді баста",
                card_balance: "Сенің теңгерімің",
                act_1: "Пластик өткізілді",
                act_2: "Эко-челлендж",
                status: "Жүруде"
            }
        };

        function setLanguage(lang) {
            // Update Text content
            document.querySelectorAll('[data-key]').forEach(elem => {
                const key = elem.getAttribute('data-key');
                if (translations[lang][key]) {
                    elem.innerText = translations[lang][key];
                }
            });

            // Special handle for Hero Title (HTML)
            document.getElementById('hero-title').innerHTML = translations[lang].hero_title;

            // Update Buttons Style
            document.getElementById('btn-ru').className = lang === 'ru' 
                ? 'px-3 py-1 rounded-lg text-xs font-bold transition-all bg-white shadow-sm' 
                : 'px-3 py-1 rounded-lg text-xs font-bold transition-all text-slate-400';
            
            document.getElementById('btn-kz').className = lang === 'kz' 
                ? 'px-3 py-1 rounded-lg text-xs font-bold transition-all bg-white shadow-sm' 
                : 'px-3 py-1 rounded-lg text-xs font-bold transition-all text-slate-400';
            
            document.documentElement.lang = lang;
        }
    </script>
</body>
</html>
